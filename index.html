
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SmartQuote UPS 在线报价系统</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
            ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
            
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

            @media print {
                @page { 
                    margin: 0 !important; 
                    size: A4 portrait;
                }

                html, body {
                    margin: 0 !important;
                    padding: 0 !important;
                    height: auto !important;
                    min-height: auto !important;
                    overflow: visible !important;
                    display: block !important; /* 强制块级布局，解决分页失效 */
                    background: white !important;
                    -webkit-print-color-adjust: exact !important;
                    print-color-adjust: exact !important;
                }

                body * { visibility: hidden; }

                /* 彻底打破弹窗容器的定位限制 */
                #root, 
                #root > div, 
                .fixed, 
                .printable-wrapper {
                visibility: visible !important;
                position: relative !important; /* 改回 relative 防止脱离流 */
                top: auto !important;
                left: auto !important;
                width: 100% !important;
                display: block !important;
                background: white !important;
                z-index: 9999 !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .printable-area {
                visibility: visible !important;
                width: 100% !important; /* 自适应宽度 */
                max-width: 210mm !important;
                margin: 0 auto !important;
                padding: 10mm 15mm !important; /* 增加顶部内边距防止截断 */
                display: block !important;
                background: white !important;
                box-sizing: border-box !important;
            }

                .printable-area * {
                    visibility: visible !important;
                }

                table {
                    width: 100% !important;
                    border-collapse: collapse !important;
                    page-break-inside: auto !important;
                }
                tr {
                    page-break-inside: avoid !important;
                    page-break-after: auto !important;
                }
                thead {
                    display: table-header-group !important;
                }

                .no-print {
                    display: none !important;
                    height: 0 !important;
                    width: 0 !important;
                }
            }
        </style>
    <script type="importmap">
    {
    "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "exceljs": "https://esm.sh/exceljs@^4.4.0",
        "file-saver": "https://esm.sh/file-saver@^2.0.5",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "recharts": "https://esm.sh/recharts@^3.6.0",
        "vite": "https://esm.sh/vite@^7.3.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
    }
    }
    </script>
    </head>
    <body class="bg-slate-100 text-slate-900 overflow-x-hidden">
        <div id="root"></div>
        <script type="module" src="/index.tsx"></script>
    </body>
    </html>
